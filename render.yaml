services:
  - type: web
    name: churchms-api
    env: python
    region: oregon
    plan: free
    
    # Build configuration
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    
    # GitHub configuration
    repo: https://github.com/cyberpriest/churchMSAPI
    branch: master
    
    # Environment variables
    envVars:
      - key: SECRET_KEY
        value: change_me_to_random_secret_key_min_32_chars
      - key: SESSION_SECRET_KEY
        value: change_me_to_random_key_min_32_chars
      - key: JWT_EXPIRE_MINUTES
        value: "20"
      - key: ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: churchms-db
          property: connectionString

  - type: pserv
    name: churchms-db
    plan: free
    region: oregon